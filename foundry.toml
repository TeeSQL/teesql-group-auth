[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# viaIR is the Yul-based compilation pipeline; produces smaller
# deployed bytecode for complex contracts. The v3 TeeSqlClusterApp
# impl (TCB gate + interface expansion + Ownable2Step) crossed
# EIP-170's 24,576 byte limit at runs=200 with the legacy pipeline;
# viaIR brings it back under the limit. See
# `dstackgres/docs/specs/iappauth-management-expansion-and-tcb-gate.md`.
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@solidstate/contracts/=lib/solidstate-solidity/contracts/",
]

# `vm.readFile` is gated behind explicit fs permissions. The
# spec-source consistency test (`test/SpecConstants.t.sol`) reads
# `../../docs/specs/cluster-v4-diamond-and-member-uups.md` to parse
# the §19 pinned-constants tables and assert each bytes32 literal
# matches the corresponding source constant. This closes the
# spec-source loop documented in §19.3 — see that section for the
# rationale.
fs_permissions = [
    { access = "read", path = "../../docs/specs/cluster-v4-diamond-and-member-uups.md" },
]
